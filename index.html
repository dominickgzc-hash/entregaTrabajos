<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Préstamos Didácticos</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            background:#f4f7fb;
            color:#333;
            padding:20px;
        }

        .container{
            max-width:1000px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 4px 15px rgba(0,0,0,.1);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#0d47a1;
        }

        form{
            display:grid;
            gap:15px;
        }

        label{
            font-weight:bold;
        }

        input,
        textarea,
        select{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        textarea{
            resize:vertical;
            min-height:100px;
        }

        button{
            background:#1565c0;
            color:white;
            border:none;
            padding:12px;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
            transition:.3s;
        }

        button:hover{
            background:#0d47a1;
        }

        .acciones{
            display:flex;
            gap:10px;
            margin-top:15px;
            flex-wrap:wrap;
        }

        .mensaje{
            margin-top:20px;
            padding:15px;
            border-radius:8px;
            display:none;
            font-weight:bold;
        }

        .exito{
            background:#d4edda;
            color:#155724;
        }

        .error{
            background:#f8d7da;
            color:#721c24;
        }

        #seccionConsulta{
            display:none;
            margin-top:30px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:15px;
            overflow-x:auto;
        }

        th{
            background:#1565c0;
            color:white;
        }

        th, td{
            padding:12px;
            border:1px solid #ddd;
            text-align:left;
        }

        tr:nth-child(even){
            background:#f5f5f5;
        }

        @media(max-width:768px){
            table{
                display:block;
                overflow-x:auto;
            }

            .acciones{
                flex-direction:column;
            }

            button{
                width:100%;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <h1>📚 Entrega de Trabajos</h1>

    <form id="formRefacciones">

        <div>
            <label for="nombre">Material *</label>
            <input type="text" id="nombre" required>
        </div>

        <div>
            <label for="categoria">Alumno *</label>
            <input type="text" id="nombre" required>
        </div>

        <div>
            <label for="dato">estado *</label>
            <input type="text" id="dato" required>
        </div>

        <div>
            <label for="observaciones">Observaciones</label>
            <textarea id="observaciones"></textarea>
        </div>
         <div>
            <label for="dato">fecha *</label>
            <input type="text" id="dato" required>
        </div>

        <div class="acciones">
            <button type="submit">
                Guardar préstamo
            </button>

            <button type="button" id="btnConsultar">
                Consultar registros
            </button>
        </div>

    </form>

    <div id="mensaje"></div>

    <section id="seccionConsulta">
        <h2>📋 Registros almacenados</h2>
        <div id="tablaRegistros"></div>
    </section>

</div>

<!-- Carga del JS -->
<script type="module" src="./app.js/app.js"></script>

</body>
</html>
